name: ayush_s_trave_app
description: A new Flutter project.
version: 1.0.0+1
environment: 
  sdk: '>=2.12.0 <3.0.0'
dependencies: 
  flutter: 
    sdk: flutter
  cached_network_image: ^3.2.1
  flutter_svg: ^1.1.6
  smooth_page_indicator: ^1.0.0+2
  flutter_svg_provider: ^1.0.3
  flutter_staggered_grid_view: ^0.4.1
  intl: ^0.18.0
dev_dependencies: 
  flutter_test: 
    sdk: flutter
flutter: 
  uses-material-design: true
  assets: 
    - assets/
    - assets/images/
  fonts: 
    - family: Heebo
      fonts: 
        - asset: assets/fonts/HeeboBold.ttf
          weight: 700
        - asset: assets/fonts/HeeboRegular.ttf
          weight: 400
        - asset: assets/fonts/HeeboExtraBold.ttf
          weight: 800
        - asset: assets/fonts/HeeboBlack.ttf
          weight: 900
        - asset: assets/fonts/HeeboMedium.ttf
          weight: 500
        - asset: assets/fonts/HeeboLight.ttf
          weight: 300
